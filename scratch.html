<!DOCTYPE html>
<html>
<head>
<style>
  html, body { height: 100%; margin: 0; display: flex; flex-direction: column; }
  .top { flex: 1; min-height: 0; background: #eee; display: flex; align-items: center; justify-content: center; }
  .bottom { height: 200px; background: #ccc; }
  .wrapper { position: relative; max-width: 100%; max-height: 100%; min-height: 0; min-width: 0; display: flex; align-items: center; justify-content: center; }
  .wrapper img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .marker { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 5px solid red; pointer-events: none; }
</style>
</head>
<body>
  <div class="top" id="top">
    <div class="wrapper" id="wrapper">
      <img src="https://via.placeholder.com/800x1600" id="img" />
      <div class="marker"></div>
    </div>
  </div>
  <div class="bottom" id="bottom" style="display: none;">
    Bottom Panel
  </div>
  <script>
    setTimeout(() => {
      document.getElementById('bottom').style.display = 'block';
    }, 1000);
  </script>
</body>
</html>
